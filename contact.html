<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Martin Varley</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <a href="index.html" class="topmark">← Back</a>

  <div class="main">
    <div class="contact-wrap">
      <h2>Get in touch</h2>
      <p class="sub">I'll come back to you directly</p>
      <div class="rule-h"></div>

      <form name="contact" method="POST" data-netlify="true" action="/thanks.html" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact">
        <p style="display:none;"><input name="bot-field"></p>

        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div class="field">
          <label for="organisation">Organisation</label>
          <input type="text" id="organisation" name="organisation" placeholder="Optional">
        </div>

        <div class="field">
          <label for="reason">Reason for contact</label>
          <select id="reason" name="reason" required>
            <option value="" disabled selected></option>
            <option>Speaking or advisory</option>
            <option>Investment or partnership</option>
            <option>Media or press</option>
            <option>Recruitment</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <footer>
    <a href="https://linkedin.com/in/martinvarley" target="_blank" rel="noopener">LinkedIn</a>
  </footer>

</body>
</html>
